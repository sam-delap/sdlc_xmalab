# Modified from DEEPLABCUT.yaml (https://github.com/DeepLabCut/DeepLabCut)
#
# DeepLabCut environment
# FIRST: INSTALL CORRECT DRIVER for GPU, see https://stackoverflow.com/questions/30820513/what-is-the-correct-version-of-cuda-for-my-nvidia-driver/30820690
#
# AFTER THIS FILE IS INSTALLED, if you have a GPU be sure to install `conda forge cudnn`
#
# install: conda env create -f xromm_dlctools.yaml
# update:  conda env update -f xromm_dlctools.yaml
name: xromm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - ipython
  - jupyter
  - nb_conda
  - notebook<7.0.0
  - ffmpeg
  - pip:
    - "deeplabcut[gui,tf]"
    - numpy<=1.24
    - blend_modes
    - imagehash

